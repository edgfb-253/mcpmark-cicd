name: Deployment Status

on:
  push:
    branches:
      - main

jobs:
  pre-deployment:
    name: pre-deployment
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.create-issue.outputs.result }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install dependencies
        run: npm install

      - name: Create deployment tracking issue
        id: create-issue
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deployment Tracking - ${context.sha.substring(0, 7)}`,
              labels: ['deployment', 'in-progress']
            });
            console.log(`Created issue number: ${issue.number}`);
            return issue.number;

      - name: Post pre-deployment comment
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue_number = ${{ steps.create-issue.outputs.result }};
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: 'Pre-deployment checks completed'
            });

  rollback-preparation:
    name: rollback-preparation
    needs: pre-deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Get previous commit and version
        id: get-info
        run: |
          echo "previous_sha=$(git rev-parse HEAD~1)" >> $GITHUB_OUTPUT
          echo "current_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "package_version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create rollback artifacts
        id: create-artifacts
        run: |
          mkdir -p rollback-artifacts
          echo "#!/bin/bash" > rollback-artifacts/rollback.sh
          echo "echo 'Performing rollback...'" >> rollback-artifacts/rollback.sh
          echo "git checkout ${{ steps.get-info.outputs.previous_sha }}" >> rollback-artifacts/rollback.sh
          echo "npm install" >> rollback-artifacts/rollback.sh
          echo "echo 'Rollback complete.'" >> rollback-artifacts/rollback.sh
          chmod +x rollback-artifacts/rollback.sh
          cp package.json package-lock.json rollback-artifacts/
          echo "Rollback script created: true" > rollback-artifacts/verification.txt
          echo "Configuration backup: true" >> rollback-artifacts/verification.txt
          
          ARTIFACT_NAME="rollback-package-${{ steps.get-info.outputs.current_sha }}"
          tar -czf ${ARTIFACT_NAME}.tar.gz rollback-artifacts
          
          CHECKSUM=$(sha256sum ${ARTIFACT_NAME}.tar.gz | awk '{ print $1 }')
          echo "checksum=${CHECKSUM}" >> $GITHUB_OUTPUT
          echo "artifact_name=${ARTIFACT_NAME}" >> $GITHUB_OUTPUT

      - name: Upload rollback artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ${{ steps.create-artifacts.outputs.artifact_name }}
          path: |
            ${{ steps.create-artifacts.outputs.artifact_name }}.tar.gz
          retention-days: 30

      - name: Post rollback plan comment
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue_number = ${{ needs.pre-deployment.outputs.issue_number }};
            const body = `
            ### 🔄 Rollback Plan Ready
            Previous Commit: ${{ steps.get-info.outputs.previous_sha }}
            Current Commit: ${{ steps.get-info.outputs.current_sha }}
            Package Version: ${{ steps.get-info.outputs.package_version }}
            Artifact: ${{ steps.create-artifacts.outputs.artifact_name }}
            SHA256: ${{ steps.create-artifacts.outputs.checksum }}

            ✅ Rollback script created
            ✅ Configuration backup created
            ✅ Dependency verification script included
            ✅ Detailed rollback documentation included
            ✅ Compressed rollback package created

            #### Quick Rollback Command
            \`\`\`bash
            gh artifact download ${{ steps.create-artifacts.outputs.artifact_name }}
            tar -xzf ${{ steps.create-artifacts.outputs.artifact_name }}.tar.gz
            cd rollback-artifacts
            ./rollback.sh
            \`\`\`

            Rollback script created: true
            Configuration backup: true
            `;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: body
            });

  post-deployment:
    name: post-deployment
    needs: [pre-deployment, rollback-preparation]
    runs-on: ubuntu-latest
    steps:
      - name: Update issue labels and close issue
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue_number = ${{ needs.pre-deployment.outputs.issue_number }};
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              name: 'in-progress'
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              labels: ['completed']
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              body: 'Deployment Completed Successfully. Rollback artifacts are available in the build.'
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue_number,
              state: 'closed'
            });